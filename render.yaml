# Render Blueprint — managed Postgres + Google Drive + persistent disk.
#
# Data flow per scraped company:
#   1. Postgres  → Render managed DB (set via DATABASE_URL below)
#   2. Drive     → Google Drive folder (uploaded by gdrive.py)
#   3. Disk      → /app/data (also exposed via /api/export/json-archive + /api/export/excel)
#
# All three run together. Disk also holds cookies, service-account JSON, and input CSVs.
#
# Deploy: push to GitHub → Render → New → Blueprint → pick the repo, then in the
# dashboard set GOOGLE_DRIVE_FOLDER_ID. Upload service-account.json + cookies via
# the Render shell (or POST /api/cookies/upload) into /app/data/credentials and /app/data/cookies.
#
# To switch to a remote/external DB (e.g. Neon) instead of Render's managed Postgres:
#   - Delete the `databases:` block
#   - Replace the `fromDatabase` DATABASE_URL entry with `sync: false` and paste the URL in the dashboard
#
databases:
  - name: recordowl-db
    plan: basic-256mb
    databaseName: recordowl
    user: recordowl

services:
  - type: web
    name: recordowl-scraper
    runtime: docker
    plan: starter            # Selenium + Chrome won't fit on free tier
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true

    disk:
      name: recordowl-data
      mountPath: /app/data
      sizeGB: 1

    envVars:
      # Primary = Neon. Set the URL in the Render dashboard (sync: false).
      - key: DATABASE_URL
        sync: false
      # Secondary = Render's managed Postgres (the `databases:` block above).
      # Every successful Neon write is mirrored here; failures here are logged only.
      - key: SECONDARY_DATABASE_URL
        fromDatabase:
          name: recordowl-db
          property: connectionString

      # Persistent paths on the mounted disk
      - key: COOKIE_FILE
        value: /app/data/cookies/recordowl-cookies.json
      - key: GOOGLE_OAUTH_CLIENT_FILE
        value: /app/data/credentials/oauth_client.json
      - key: GOOGLE_OAUTH_TOKEN_FILE
        value: /app/data/credentials/oauth_token.json
      - key: JSON_DIR
        value: /app/data/json_data
      # INPUT_DIR is intentionally NOT overridden — entities.csv ships in the image
      # at /app/input_files (default), so it's available without disk seeding.

      # Scrape config
      - key: INPUT_CSV_FILENAME
        value: entities.csv
      - key: SCRAPE_START_ROW
        value: "0"
      - key: SCRAPE_END_ROW
        value: "500"
      - key: AUTO_START_SCRAPE
        value: "true"
      - key: RATE_LIMIT_MIN
        value: "3"
      - key: RATE_LIMIT_MAX
        value: "10"

      # Set in Render dashboard (sync: false keeps it out of git)
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
