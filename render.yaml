# Render Blueprint — free-tier deployment.
#
# All persistent state lives off-Render:
#   - DB    → Neon Postgres (DATABASE_URL)
#   - JSON  → Google Drive (OAuth env vars + GOOGLE_DRIVE_FOLDER_ID)
# The container itself is fully ephemeral. Cookies are uploaded per session.
#
# Set the `sync: false` env vars in the Render dashboard after first deploy.

services:
  - type: web
    name: recordowl-scraper
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      # Neon Postgres URL — paste in dashboard
      - key: DATABASE_URL
        sync: false

      # Google Drive (OAuth user creds — produced by `python oauth_setup.py` locally)
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false

      # Scrape config
      - key: INPUT_CSV_FILENAME
        value: entities.csv
      - key: SCRAPE_START_ROW
        value: "0"
      - key: SCRAPE_END_ROW
        value: "500"
      - key: AUTO_START_SCRAPE
        value: "true"
      - key: RATE_LIMIT_MIN
        value: "3"
      - key: RATE_LIMIT_MAX
        value: "10"
